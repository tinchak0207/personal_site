name: Generate Graph Proposal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: |
          cd automation/agent_graph
          python -m pip install -e .

      - name: Generate proposal
        id: generate
        run: |
          cd automation/agent_graph
          python -m agent_graph.cli generate-proposal --output-dir "${{ github.workspace }}/proposals"
          latest_file=$(cat "${{ github.workspace }}/proposals/latest.json")
          echo "proposal_file=$latest_file" >> "$GITHUB_OUTPUT"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENT_GRAPH_MODEL: ${{ secrets.AGENT_GRAPH_MODEL }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "feat: add graph proposal"
          branch: "agent/graph-proposal"
          delete-branch: true
          title: "feat: graph proposal"
          body: |
            Automated graph proposal generated by `agent_graph`.

            - Proposal file: `${{ steps.generate.outputs.proposal_file }}`
            - Review in PR, then approve from WeChat with `√ PR-<number>`
          add-paths: |
            proposals/*.json
