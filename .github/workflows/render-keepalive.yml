name: Render Keepalive

"on":
  schedule:
    # Avoid the top of the hour, where GitHub notes scheduled jobs are more
    # likely to be delayed or dropped under load.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if keepalive URL is not configured
        if: ${{ secrets.RENDER_KEEPALIVE_URL == '' }}
        run: echo "RENDER_KEEPALIVE_URL is not set; skipping ping."

      - name: Wake the store
        if: ${{ secrets.RENDER_KEEPALIVE_URL != '' }}
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          set -euo pipefail
          HEALTH_URL="${RENDER_KEEPALIVE_URL%/}/health?ts=$(date +%s)"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --max-time 30 \
            --retry 2 \
            --retry-delay 2 \
            --header "Cache-Control: no-cache" \
            --header "Pragma: no-cache" \
            --user-agent "github-actions-render-keepalive" \
            "$HEALTH_URL"
