name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if keepalive URL is not configured
        if: ${{ secrets.RENDER_KEEPALIVE_URL == '' }}
        run: echo "RENDER_KEEPALIVE_URL is not set; skipping ping."

      - name: Wake the store
        if: ${{ secrets.RENDER_KEEPALIVE_URL != '' }}
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          set -euo pipefail
          HEALTH_URL="${RENDER_KEEPALIVE_URL%/}/health"
          curl --fail --silent --show-error --location --max-time 30 --retry 2 "$HEALTH_URL"
